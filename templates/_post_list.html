<ul class="post-list">
    {% for post in posts %}
    <li>
        <a href="{{ url_for('post_detail', post_id=post['id']) }}">{{ post['title'] }}</a>
        <span class="category">{{ post['category'] }}</span>
        <span class="date">{{ post['created_at'] }}</span>
    </li>
    {% endfor %}
</ul>
